version: '2.2'

services:
    bemodule:
      container_name: dolcezampa_webservice
      image: ghcr.io/dolce-zampa/webservice:v1-alpha
      networks:
        - dolcezampa
      restart: unless-stopped
      ports:
        - "8787:80"

networks:
  dolcezampa:
    external: true
    name: dolcezampa_default
