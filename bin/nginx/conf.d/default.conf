server {
    listen 80;
    server_name www.dolcezampa.com dolcezampa.com;

    # DNS interno di Docker per risolvere dinamicamente i nomi dei container 
    # ed evitare che Nginx si perda se cambiano IP interni
    resolver 127.0.0.11 valid=30s;

    # Per Let's Encrypt / Certbot
    location ^~ /.well-known {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
    }

    client_max_body_size 64M;
    
    # Timeout generosi ma bilanciati
    proxy_connect_timeout 90s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;
    send_timeout 90s;

    # Configurazione di base per gli header (evita ripetizioni)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;

    # 1. BACKEND API
    location /api {
        set $backend_webservice http://dolcezampa_webservice;
        proxy_pass $backend_webservice; 

        proxy_request_buffering off;
        proxy_buffering off;
    }

    # BACKEND PRESTASHOP API
    location /psapi/ {
        set $backend_psapi http://dolcezampa_prestashop/api/;
        proxy_pass $backend_psapi;

        proxy_request_buffering off;
        proxy_buffering off;
    }

    # BACKEND PRESTASHOP ADMIN
    location /admin941xremvautknsgc2cj {
        set $backend_prestashop http://dolcezampa_prestashop;
        proxy_pass $backend_prestashop;

        add_header Content-Security-Policy "frame-ancestors 'self' https://www.google.com https://www.gstatic.com;";
        
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
        proxy_set_header X-Forwarded-Ssl on;    
        proxy_set_header X-Url-Scheme https; 

        proxy_buffering off;
    }

    # SITEMAPS and RESOURCES
    location /1_it_0_sitemap.xml {
        set $sitemap1 http://dolcezampa_prestashop/1_it_0_sitemap.xml;
        proxy_pass $sitemap1;
        proxy_buffering off;
    }

    location /manual_sitemap.xml {
        set $sitemap2 http://dolcezampa_prestashop/manual_sitemap.xml;
        proxy_pass $sitemap2;
        proxy_buffering off;
    }

    location /robots.txt {
        set $sitemap2 http://dolcezampa_prestashop/robots.txt;
        proxy_pass $sitemap2;
        proxy_buffering off;
    }

    # BLOG PRESTASHOP
    location /blog {
        set $backend_blog http://dolcezampa_prestashop;
        proxy_pass $backend_blog;
        proxy_buffering off;
    }

    # 2. IMMAGINI NEXT.JS (Buffer ottimizzati per file multimediali)
    location /_next/image {
        set $frontend_images http://dolcezampa_storefront:3000;
        proxy_pass $frontend_images;
        
        proxy_pass_request_headers on;
        
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffers 32 16k; # 512k totali, perfetti per immagini ottimizzate
    }

    # 3. FILE STATICI NEXT.JS (Risolve il problema del log / buffering su disco)
    location /_next/static/ {
        set $frontend_static http://dolcezampa_storefront:3000;
        proxy_pass $frontend_static;
        
        proxy_buffering off; # Spara i JS/CSS direttamente al client senza toccare il disco della VPS
        expires 365d;        # Ottimo per la velocità del sito e la SEO
        access_log off;
    }

    # 4. FRONTEND NEXT.JS (Pagine e Routing)
    location / {
        set $frontend_root http://dolcezampa_storefront:3000;
        proxy_pass $frontend_root;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_pass_header Content-Type;
        proxy_pass_header RSC;
        proxy_pass_header Next-Router-State-Tree;
        proxy_pass_header Next-Router-Prefetch;
        proxy_pass_header Next-Url;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "RSC, Next-Router-State-Tree, Next-Router-Prefetch" always;

        # BUFFER POTENZIATI: Evitano la saturazione dei canali Nginx con Next.js
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffers 32 8k; 
    }
}