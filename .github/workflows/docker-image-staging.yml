name: Docker Image CI

on:
  push:
    tags:
      - 'RC*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN }}
    
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/dolce-zampa/webservice:${{ github.ref_name }}
    
    - name: Push the Docker image
      run: |
        docker push ghcr.io/dolce-zampa/webservice:${{ github.ref_name }}

