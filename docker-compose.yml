version: '3.8'

services:
  webservice:
    image: ghcr.io/dolce-zampa/webservice:latest
    networks:
      - dolcezampa_default
    volumes:
      # NOTA: Per Swarm, i path relativi come "./" non sono raccomandati a meno che
      # la cartella non sia identica e presente su TUTTI i nodi.
      - /opt/dolcezampa/.env:/var/www/workdir/.env
      - /opt/dolcezampa/configs:/var/www/workdir/storage/configs
    deploy:
      replicas: 2  # Alta affidabilità: se un nodo cade, l'altro risponde
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
      restart_policy:
        condition: on-failure

  worker-product-images:
    image: ghcr.io/dolce-zampa/webservice:latest
    command: ["php", "bin/worker-product-images"]
    networks:
      - dolcezampa_default
    volumes:
      - /opt/dolcezampa/.env:/var/www/workdir/.env
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1 # Di solito i worker non hanno bisogno di repliche parallele a meno di alta coda
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
      restart_policy:
        condition: on-failure
  
  cache:
    image: redis:alpine
    networks:
      - dolcezampa_default
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  prestashop:
    image: ghcr.io/dolce-zampa/prestashop:latest
    # depends_on non è pienamente supportato in Swarm per l'ordine di avvio, usiamo i vincoli
    networks:
      - dolcezampa_default
    volumes:
       - /opt/dolcezampa/public:/var/www/workdir/public
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.00'
          memory: 1536M
      placement:
        constraints:
          # Vincoliamo Prestashop al Manager (o a un nodo specifico) se usi file locali
          - node.role == manager 

  proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dolcezampa_default
    volumes:
      - /opt/dolcezampa/bin/nginx/conf.d:/etc/nginx/conf.d
      - /opt/dolcezampa/bin/certbot/conf:/etc/letsencrypt
      - /opt/dolcezampa/bin/certbot/www:/var/www/certbot
      - /opt/dolcezampa/public:/var/www/html:ro
    deploy:
      replicas: 2 # Swarm farà routing automatico (Ingress) su qualsiasi VPS riceva il traffico
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
      placement:
        constraints:
          - node.role == manager

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /opt/dolcezampa/bin/certbot/conf/:/etc/letsencrypt/
      - /opt/dolcezampa/bin/certbot/www/:/var/www/certbot/
    deploy:
      restart_policy:
        condition: none # Certbot deve girare solo al bisogno o via cron, non all'infinito

networks:
  dolcezampa_default:
    driver: overlay # FONDAMENTALE: l'overlay network permette ai container su VPS diverse di parlarsi
    attachable: true

volumes:
  mysql_data: # Definito ma non usato (visto che usi un DB esterno gestito, puoi anche rimuoverlo)