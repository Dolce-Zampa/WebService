server {
    listen 80;
    server_name api.dolcezampa.com;

    # Per Let's Encrypt / Certbot (se serve sul server locale)
    location ^~ /.well-known {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
    }

    client_max_body_size 64M;
    
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # 1. BACKEND API (Senza lo slash finale su proxy_pass)
    location /api {
        proxy_pass http://dolcezampa_webservice; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    # BACKEND PRESTASHOP API (Con gli slash finali allineati)
    location /psapi/ {
        proxy_pass http://dolcezampa_prestashop/api/; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location /admin941xremvautknsgc2cj {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

	    add_header Content-Security-Policy "frame-ancestors 'self' https://www.google.com https://www.gstatic.com;";
	    # Forza il passaggio dell'header di autorizzazione al backend
    	proxy_set_header Authorization $http_authorization;
    	proxy_pass_header Authorization;
        # Forward degli header standard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
#        proxy_set_header X-Forwarded-Proto $forwarded_proto;
	    proxy_set_header X-Forwarded-Ssl on;	
	    proxy_set_header X-Url-Scheme https; 
        # Buffer ottimizzati
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    location /1_it_0_sitemap.xml {
        proxy_pass http://dolcezampa_prestashop/1_it_0_sitemap.xml; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    location /manual_sitemap.xml {
        proxy_pass http://dolcezampa_prestashop/manual_sitemap.xml; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    location /robots.txt {
        set $sitemap2 http://dolcezampa_prestashop/robots.txt;
        proxy_pass $sitemap2;
        proxy_buffering off;
    }

        # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location /blog {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    
}

server {
    listen 80;
    server_name aidyis-prod-backoffice.dolcezampa.com;

    # PER LET'S ENCRYPT - Servi la verifica prima del redirect
    location ^~ /.well-known {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
        try_files $uri $uri/ =404;
    }


    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    server_name aidyis-prod-backoffice.dolcezampa.com;

    ssl_certificate /etc/letsencrypt/live/aidyis-prod-backoffice.dolcezampa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidyis-prod-backoffice.dolcezampa.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 100M;

    location /api {
        proxy_pass http://dolcezampa_prestashop;
        
        # IMPORTANTE: Passa l'header Authorization
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header X-WS-Key $http_x_ws_key;
        
        # Passa anche questi header
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disabilita il buffering per evitare problemi
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Timeout
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location / {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

	    add_header Content-Security-Policy "frame-ancestors 'self' https://www.google.com https://www.gstatic.com;";
	    # Forza il passaggio dell'header di autorizzazione al backend
    	proxy_set_header Authorization $http_authorization;
    	proxy_pass_header Authorization;
        # Forward degli header standard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
#        proxy_set_header X-Forwarded-Proto $forwarded_proto;
	    proxy_set_header X-Forwarded-Ssl on;	
	    proxy_set_header X-Url-Scheme https; 
        # Buffer ottimizzati
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }
}