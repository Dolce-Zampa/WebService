name: Docker Image CI

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4

    - name: Create test .env file
      run: |
        cat > .env << EOF
        APP_ENV=test
        APP_DEBUG=true
        DATABASE_URL=sqlite:///:memory:
        # Aggiungi altre variabili necessarie per i test
        EOF
    
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag webservice:test
    
    - name: Run unit tests on NEW image
      run: |
        docker run --rm webservice:test vendor/bin/phpunit --testdox --colors=always
    
  push-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test  # Solo se i test passano
    environment: prod
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN }}
    
    - name: Build and push Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/dolce-zampa/webservice:latest
        docker push ghcr.io/dolce-zampa/webservice:latest
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.TOKEN }}
          docker pull ghcr.io/dolce-zampa/webservice:latest
          docker stop dolcezampa_webservice || true
          docker rm dolcezampa_webservice || true
          cd /root/infra && docker-compose up -d --build webservice