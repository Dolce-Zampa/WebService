server {
    listen 80;
    server_name aidyis-prod-backoffice.dolcezampa.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name aidyis-prod-backoffice.dolcezampa.com;

    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/www.dolcezampa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.dolcezampa.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location /admin941xremvautknsgc2cj {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

	    add_header Content-Security-Policy "frame-ancestors 'self' https://www.google.com https://www.gstatic.com;";
	    # Forza il passaggio dell'header di autorizzazione al backend
    	proxy_set_header Authorization $http_authorization;
    	proxy_pass_header Authorization;
        # Forward degli header standard
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
#        proxy_set_header X-Forwarded-Proto $forwarded_proto;
	    proxy_set_header X-Forwarded-Ssl on;	
	    proxy_set_header X-Url-Scheme https; 
        # Buffer ottimizzati
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }
}