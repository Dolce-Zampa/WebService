server {
    listen 80;
    server_name www.dolcezampa.com;
    server_name dolcezampa.com;

    # Per Let's Encrypt / Certbot (se serve sul server locale)
    location ^~ /.well-known {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
    }

    client_max_body_size 64M;
    
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # 1. BACKEND API (Senza lo slash finale su proxy_pass)
    location /api {
        proxy_pass http://dolcezampa_webservice; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    # BACKEND PRESTASHOP API (Con gli slash finali allineati)
    location /psapi/ {
        proxy_pass http://dolcezampa_prestashop/api/; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location /admin941xremvautknsgc2cj {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    location /1_it_0_sitemap.xml {
        proxy_pass http://dolcezampa_prestashop/1_it_0_sitemap.xml; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

        # BACKEND PRESTASHOP (Con gli slash finali allineati)
    location /blog {
        proxy_pass http://dolcezampa_prestashop; # <--- Nota lo slash alla fine di /api/

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }

    # 2. IMMAGINI NEXT.JS
    location /_next/image {
        proxy_pass http://dolcezampa_storefront:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass_request_headers on;
        
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 64k;
        proxy_buffers 64 4k;
    }

    # 3. FRONTEND NEXT.JS
    location / {
        proxy_pass http://dolcezampa_storefront:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Forza Nginx a NON indovinare il content-type e a prendere quello di Next.js
        proxy_pass_header Content-Type;
        proxy_pass_header RSC;
        proxy_pass_header Next-Router-State-Tree;
        proxy_pass_header Next-Router-Prefetch;
        proxy_pass_header Next-Url;

        # Evita che il browser o la cache ignorino il tipo di file originale
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "RSC, Next-Router-State-Tree, Next-Router-Prefetch" always;

        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 64k;
        proxy_buffers 64 4k;
    }
}