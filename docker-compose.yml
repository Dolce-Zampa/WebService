services:
  webservice:
    container_name: dolcezampa_webservice
    image: ghcr.io/dolce-zampa/webservice:v1-alpha
    networks:
      dolcezampa_default:
        aliases:
          - demo.dolcezampa.com
    restart: unless-stopped
    ports:
      - "8787:80"

  worker-product-images:
    container_name: dolcezampa_worker_product_images
    image: ghcr.io/dolce-zampa/webservice:v1-alpha
    command: ["php", "bin/worker-product-images"]
    restart: unless-stopped
    networks:
      - dolcezampa_default
    # LIMITAZIONI DI RISORSE
    mem_limit: 1g
    memswap_limit: 1g  # Limita anche lo swap
    cpus: 0.5
    pids_limit: 100
    # HEALTHCHECK per riavvio automatico
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  cache:
    image: redis:alpine
    container_name: dolcezampa_rediscache
    restart: unless-stopped
    networks:
      - dolcezampa_default

networks:
  dolcezampa_default:
    external: true
    name: dolcezampa_default
    